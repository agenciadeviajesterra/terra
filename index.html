<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia de Viajes Terra | Descubre el mundo</title>
    
    <!-- Tipografías y Estilos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Encabezado -->
    <header>
        <nav class="navbar">
            <div class="logo">TERRA <span>VIAJES</span></div>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#paquetes">Paquetes</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- Portada Cinematográfica (Scroll Horizontal) -->
    <section id="inicio" class="swiper mySwiper">
        <div class="swiper-wrapper" id="hero-slider">
            <!-- Los slides se cargan automáticamente desde JavaScript -->
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
    </section>

    <!-- Sección de Paquetes -->
    <section id="paquetes" class="packages-section">
        <h2>Nuestros Paquetes Destacados</h2>
        <div class="packages-grid" id="packages-container">
            <!-- Las tarjetas se cargan automáticamente desde JavaScript -->
        </div>
    </section>

    <!-- Contacto -->
    <footer id="contacto">
        <h2>¿Listo para tu próxima aventura?</h2>
        <p>Contáctanos para personalizar tu viaje</p>
        <a href="mailto:info@terra.com" class="btn-contacto">Escríbenos</a>
        <p class="copyright">© 2024 Agencia de Viajes Terra. Todos los derechos reservados.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
